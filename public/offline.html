<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Offline — Xiway POS</title>
    <meta name="theme-color" content="#0f766e">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100dvh; font-family: system-ui, sans-serif;
            background: linear-gradient(160deg, #0f766e 0%, #134e4a 100%);
            color: #ecfdf5; display: flex; align-items: center; justify-content: center;
            padding: 1.5rem; text-align: center;
        }
        .card { max-width: 22rem; background: rgba(255,255,255,.1); backdrop-filter: blur(8px);
            border-radius: 1rem; padding: 2rem 1.5rem; border: 1px solid rgba(255,255,255,.2); }
        h1 { font-size: 1.25rem; margin: 0 0 .5rem; }
        p { margin: 0; opacity: .9; font-size: .95rem; line-height: 1.5; }
        a { display: inline-block; margin-top: 1.25rem; padding: .75rem 1.25rem; background: #fff;
            color: #0f766e; font-weight: 600; border-radius: .75rem; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Tidak ada koneksi</h1>
        <p>Anda sedang offline. Periksa jaringan lalu coba buka lagi Xiway POS.</p>
        <a href="/">Coba lagi</a>
    </div>
</body>
</html>
